name: CI

on: 
  push:
    branches: [ master, main ]
  pull_request:

  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ 
          {
            name: Windows,
            runs-on: windows-latest,
          },
          {
            name: Ubuntu,
            runs-on: ubuntu-latest,
          },
          {
            name: MacOS,
            runs-on: macos-latest,
          }
        ]

    runs-on: ${{ matrix.os.runs-on }}

    name: ${{ matrix.os.name }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run tests
        run: dotnet run --project Epsilon.Tests/ 
